# Alembic Configuration — Multicloud Curator
#
# Catatan: sqlalchemy.url di-override oleh env.py dari settings.database_url,
# tetapi tetap WAJIB di-set di sini sebagai fallback dan agar Alembic CLI tidak
# error saat parse config.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite:///./app.db

# Format file migration: NNNN_slug.py (e.g. 0001_initial_schema.py).
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]
# Tidak ada hook (Ruff dijalankan manual di pre-commit, kalau perlu).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
